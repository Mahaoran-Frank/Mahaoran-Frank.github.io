<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title | escape }} · Frank Ma</title>
    <meta
      name="description"
      content="{{ page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}"
    />
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/output.css' | relative_url }}" />
  </head>
  <body class="output-page">
    <main class="output-shell">
      <nav class="output-back" aria-label="返回导航">
        <a href="{{ '/outputs/' | relative_url }}"><span aria-hidden="true">↖</span> 公开输出</a>
      </nav>

      <header class="output-title-block">
        <h1>{{ page.title | default: "Untitled" | escape }}</h1>
        {% if page.date %}
          <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%-m月%-d日" }}</time>
        {% endif %}
      </header>

      <article class="output-content">
        {{ content }}
      </article>

      <footer class="output-footer">
        <a href="{{ '/' | relative_url }}">Frank Ma</a>
        <span>{{ site.time | date: "%Y" }}</span>
      </footer>
    </main>
  </body>
</html>
