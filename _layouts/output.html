<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title | escape }}</title>
    <meta
      name="description"
      content="{{ page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}"
    />
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/output.css' | relative_url }}" />
  </head>
  <body class="output-page">
    <header class="output-nav">
      <a class="output-brand" href="{{ '/' | relative_url }}">Frank Ma</a>
      <nav aria-label="页面导航">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="https://github.com/Mahaoran-Frank" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </header>

    <main class="output-shell">
      <article class="output-article">
        <header class="output-title-block">
          <p class="output-label">PUBLIC OUTPUT</p>
          <h1>{{ page.title | default: "Untitled" | escape }}</h1>
          {% if page.description %}
            <p class="output-description">{{ page.description }}</p>
          {% endif %}
          {% if page.date %}
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
          {% endif %}
        </header>

        <div class="output-content">
          {{ content }}
        </div>
      </article>
    </main>

    <footer class="output-footer">
      <a href="{{ '/' | relative_url }}">返回 Frank 的个人主页</a>
    </footer>
  </body>
</html>
