  <script type="text/markdown" data-key="about" data-num="01" data-en="About" data-zh="关于" data-layout="prose">
我习惯把现象拆到底层、再重建成框架。拿到一个问题，我的本能不是急着行动，而是先拆开看「这套系统底层的齿轮怎么咬合」—— 不满足于「是什么」，一定追到「为什么」，再追到「然后呢」。这套**第一性原理 + 系统思维**，是我最顺手的认知武器。

但我不空谈理论。我信奉**实用理性主义**：能转化成判断、能驱动决策的知识，才是高优先级的；我不信「听起来对」，只信「验证过才算数」，习惯用「假设 → 验证 → 迭代」推进。

从南京财经大学人力资源本科，到辽宁大学企业管理硕士，再主动转向数据分析 + AI —— 因为这正是把「理解业务结构」和「拆解底层机制」这两件我最擅长的事，合到一起的地方。
  </script>

  <script type="text/markdown" data-key="skills" data-num="02" data-en="Capabilities" data-zh="能力" data-layout="caps">
### 数据分析
SQL（多表连接 · 窗口函数 · 分组聚合）· Excel（透视表 · 函数嵌套 · 图表）· 指标体系 · 漏斗 / 留存 / 异动归因 / 用户分层 · 闭环：问题定义 → 指标设计 → 分析 → 结论建议。

### AI 应用
深度使用 Claude / ChatGPT / Gemini 跑复杂分析 · 理解 Prompt / RAG / Agent / 评测与企业落地 · 对 Claude / Kimi / 豆包做过系统级产品拆解。

### 商业 / 策略
商业模式拆解 · 竞争格局量化（CR / HHI）· 进入策略框架 · 把模糊的商业判断，转成可比较、可验证的分析结构。
  </script>

  <script type="text/markdown" data-key="work" data-num="03" data-en="Selected Work" data-zh="作品" data-layout="work">
### Retailrocket RFIF 用户分层
*独立项目 · 2025*

发现传统 RFM 只看历史购买、抓不住「高意向未转化」用户，自创 **RFIF 四维框架**：购买近度、频次、浏览加购意向得分、加购未成交摩擦率。口径固化，保证可复现。

> 产出三类可运营用户标签，每类对应到具体运营动作。

### 新能源汽车价格带进入策略
*独立项目 · 2025*

围绕「新品牌首款车型进哪个价格带」，用 **CR / HHI** 量化竞争格局，把市场规模、单车利润、回本周期、品牌门槛纳入统一决策结构，多场景敏感性分析验证稳健性。

> 给出可落地的进入价格带建议，并说明它在什么条件下会失效。

### AI 驱动的个人知识系统
*个人项目 · 2025 至今*

从零设计搭建（Obsidian + Claude + iCloud），420+ 笔记、5 个活跃主题域。三层架构：Inbox 原始输入 → Work 个人分析 → Train AI 验证。自写 Claude Skill `/train`，用苏格拉底式追问戳破「我懂了」的错觉，把新判断写回笔记。

> 一个会自己长大的系统 —— 你正在看的这个网站，就是它的对外门面。

→ [github.com/Mahaoran-Frank/obsidian-claude-pkm](https://github.com/Mahaoran-Frank/obsidian-claude-pkm)

### AI 学术研究 Agent
*辽宁大学 × 字节火山引擎 · 进行中 · 2025*

作为经济管理领域代表，梳理科研工作流、识别 AI 介入的真实价值点，把研究者的隐性需求翻译成可测试的功能需求。

> 提出区别于通用场景的领域质量标准：来源可信度、逻辑一致性、引用准确性。
  </script>

### 造星 vs. 消费星
内容平台不该买已有的注意力，而要用内容本身生产新的注意力资产：消费星是成本，造星是投资。

### 结构性崩塌中的个人例外
废墟里能有幸存者，但靠的是个人护城河——不能用例外来反驳结构。

### 叙事结构性接管
一个叙事失效，下一个现成叙事会自动填进来；直到无可填，个体才被迫自己回答「我要什么」。

### 有竞争力 ≠ 有壁垒
能通过人才流动或供应商扩散的领先，不是真壁垒。壁垒需要结构性优势，不只是技术领先。

### AI 拉大差距，而非缩小
AI 是放大器，不是均衡器——它放大的是使用者本身已有的能力。

### 标签排除的人，可能正是潜在用户
定位越具体，排除的人越多；市场饱和时，被标签挡在外面的人往往是下一波增长。

系统 1 / 系统 2 与框架效应：为什么人很难真正用统计的方式去思考。

### 原子习惯 <span class="au">James Clear</span>
以身份为目标，而非结果——「我是一个健康的人」胜过「我想减肥」。

### 精益数据分析 <span class="au">Lean Analytics</span>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
  marked.setOptions({ breaks:true, gfm:true });
  const AVATAR = "avatar.jpg";

  // avatar with graceful fallback
  (function(){
    const img = document.getElementById("avatar");
    img.src = AVATAR;
    img.onerror = () => {
      const fb = document.createElement("div");
      fb.className = "photo-fallback";
      fb.textContent = "把照片存为 avatar.jpg 放进同目录即可显示";
      img.replaceWith(fb);
    };
  })();

  const blocks = [...document.querySelectorAll('script[type="text/markdown"]')].map(s => ({
    key:s.dataset.key, num:s.dataset.num, en:s.dataset.en, zh:s.dataset.zh,
    layout:s.dataset.layout, sub:s.dataset.sub || "", md:s.textContent.trim()
  }));

  const doc = document.getElementById("doc");

  // group consecutive nodes under each <h3> into .item wrappers
  function groupByH3(container){
    const kids = [...container.childNodes];
    container.innerHTML = "";
    let cur = null;
    kids.forEach(n => {
      if (n.nodeType === 1 && n.tagName === "H3") {
        cur = document.createElement("div"); cur.className = "item";
        container.appendChild(cur); cur.appendChild(n);
      } else if (cur) {
        cur.appendChild(n);
      } else if (n.nodeType === 1) {
        container.appendChild(n);
      }
    });
  }

  blocks.forEach(b => {
    const sec = document.createElement("section");
    sec.className = "sec " + b.key; sec.id = b.key;

    const head = document.createElement("div");
    head.className = "sec-head";
    head.innerHTML =
      `<div class="sec-id"><span class="sec-num">${b.num}</span><span class="sec-en">${b.en}</span></div>` +
      `<h2 class="sec-zh">${b.zh}</h2>`;
    sec.appendChild(head);

    const body = document.createElement("div");
    body.className = "sec-body";
    if (b.sub) {
      const sub = document.createElement("p"); sub.className = "sub";
      sub.innerHTML = marked.parseInline(b.sub); body.appendChild(sub);
    }
    const inner = document.createElement("div");
    inner.innerHTML = marked.parse(b.md);

    if (b.layout === "prose")  { inner.classList.add("prose","measure"); }
    if (b.layout === "caps")   { inner.classList.add("grid-caps"); groupByH3(inner); }
    if (b.layout === "work")   { groupByH3(inner); inner.querySelectorAll(".item").forEach(decorateWork); }
    if (b.layout === "lex")    { inner.classList.add("lex"); groupByH3(inner); }
    if (b.layout === "read")   { inner.classList.add("read"); groupByH3(inner); }
    if (b.layout === "contact"){ decorateContact(inner); }

    if (b.layout === "work") sec.classList.add("work");
    if (b.layout === "read") sec.classList.add("read");
    if (b.layout === "contact") sec.classList.add("contact");

    body.appendChild(inner);
    sec.appendChild(body);
    doc.appendChild(sec);
  });

  // work: split into index + body, tag meta line and repo line
  function decorateWork(item){
    const idx = document.createElement("div"); idx.className="idx";
    const bd  = document.createElement("div"); bd.className="bd";
    [...item.childNodes].forEach(n => bd.appendChild(n));
    bd.querySelectorAll("p").forEach(p => {
      const em = p.querySelector("em");
      if (em && p.textContent.trim() === em.textContent.trim()) p.classList.add("meta");
      if (p.textContent.trim().startsWith("→")) p.classList.add("repo");
    });
    item.innerHTML=""; item.append(idx, bd);
  }
  function numberWork(){
    document.querySelectorAll(".work .item .idx").forEach((el,i)=> el.textContent = "W"+(i+1));
  }

  function decorateContact(inner){
    const ul = inner.querySelector("ul");
    if (!ul) return;
    const list = document.createElement("div"); list.className="clist";
    ul.querySelectorAll("li").forEach(li => {
      const strong = li.querySelector("strong");
      const a = li.querySelector("a");
      const lbl = strong ? strong.textContent : "";
      const row = document.createElement(a ? "a" : "span");
      if (a) row.href = a.getAttribute("href"); else row.className = "row";
      const rest = a ? a.textContent : li.textContent.replace(/^[^·]*·\s*/,"");
      row.innerHTML = `<span class="lbl">${lbl}</span><span>${rest}</span>`;
      list.appendChild(row);
    });
    ul.replaceWith(list);
  }

  numberWork();

  // external links new tab
  doc.querySelectorAll('a[href^="http"]').forEach(a => { a.target="_blank"; a.rel="noopener"; });

  // nav: smooth scroll
  function goto(key){
    if (key==="top") { window.scrollTo({top:0,behavior:"smooth"}); return; }
    const el = document.getElementById(key);
    if (el) el.scrollIntoView({behavior:"smooth", block:"start"});
  }
  document.querySelectorAll("[data-go]").forEach(el =>
    el.addEventListener("click", e => { e.preventDefault(); goto(el.dataset.go); }));

  // scrollspy on masthead nav
  const navKeys = ["about","work","frameworks","reading"];
  const navEls = {}; document.querySelectorAll(".mast-nav a[data-go]").forEach(a => navEls[a.dataset.go]=a);
  function spy(){
    let cur = null;
    navKeys.forEach(k => { const s=document.getElementById(k); if (s && s.getBoundingClientRect().top <= 160) cur=k; });
    Object.values(navEls).forEach(a => a.classList.remove("on"));
    if (cur && navEls[cur]) navEls[cur].classList.add("on");
  }
  window.addEventListener("scroll", spy, {passive:true}); spy();

  // deep-link: scroll to #section on load (sections are built by JS, so do it after build)
  if (location.hash) { const t = document.getElementById(location.hash.slice(1)); if (t) setTimeout(() => t.scrollIntoView(), 60); }
</script>
</body>
</html>
