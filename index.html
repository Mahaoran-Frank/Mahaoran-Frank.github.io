# 马浩然 / Frank

> 我把复杂问题拆到底层机制，再重建成能用的框架 —— 用数据和 AI，让判断落到业务里。

企业管理硕士在读 · 数据分析 / AI 方向 · 沈阳 / 远程 · 在找实习

## 关于我

我是一个习惯把现象拆到底层、再重建成框架的人。

拿到一个问题，我的本能不是急着行动，而是先拆开看「这套系统底层的齿轮是怎么咬合的」—— 不满足于「是什么」，一定要追到「为什么」，然后追到「然后呢」。这套**第一性原理 + 系统思维**的方式，是我最顺手的认知武器。

但我不是空谈理论的人。我信奉**实用理性主义**：知识的意义在于能用 —— 能转化成判断、能驱动决策的知识，才是高优先级的。我也不信「听起来对」，只信「验证过才算数」，习惯用「假设 → 验证 → 迭代」推进。

背景上，我从南京财经大学人力资源管理本科，到辽宁大学企业管理硕士，再主动转向数据分析 + AI —— 因为这正是我能把「理解业务结构」和「拆解底层机制」两件最擅长的事合到一起的地方。

# 作品

## Retailrocket RFIF 用户分层分析
*独立项目 · 2025*

发现传统 RFM 只能看历史购买、抓不住「高意向未转化」用户的局限，自创**四维分层框架**：R（购买近度）、F（购买频次）、I（浏览加购意向得分）、Fr（加购未成交摩擦率）。口径固化保证可复现，输出三类用户标签并对应到具体运营方向。

## 新能源汽车价格带进入策略分析
*独立项目 · 2025*

围绕「新品牌首款车型该进哪个价格带」，用 CR / HHI 量化竞争格局，把市场规模、单车利润、回本周期、品牌门槛纳入统一决策结构，系统对比两个价格带，并用多场景敏感性分析验证结论稳健性。

## AI 驱动的个人知识系统
*个人项目 · 2025–至今*

从零设计并搭建（Obsidian + Claude + iCloud），目前 420+ 笔记、5 个活跃主题域。三层架构：Inbox（原始输入不改动）→ Work（个人综合分析）→ Train（AI 验证）。自写 Claude Skill `/train`，用苏格拉底式对话发现理解漏洞、把新洞见写回原笔记。并对 Claude / Kimi / 豆包做了系统产品拆解。

→ [查看代码：github.com/Mahaoran-Frank/obsidian-claude-pkm](https://github.com/Mahaoran-Frank/obsidian-claude-pkm)

## AI 学术研究 Agent
*辽宁大学 × 字节火山引擎 · 进行中 · 2025*

作为经济管理领域代表，负责梳理科研工作流、识别 AI 介入的真实价值点，把研究者的隐性需求翻译成可测试的功能需求，并提出区别于通用场景的领域质量标准（来源可信度、逻辑一致性、引用准确性）。

  <script type="text/markdown" data-key="system" data-label="在建的体系" data-group="我在往哪走" data-eyebrow="DIRECTION">
# 我在建的体系

比起「学会某个工具」，我更想搭建能跨场景迁移的认知体系。几条正在长期投入的线，其实彼此相连：

- **AI（技术 + 商业）** —— 最深的一条。从应用层往下补底层机制，目标是真正讲清 AI 怎么运转、又怎么在企业里落地。
- **商业模式** —— 沉淀一套自己的分析框架，拿到一家公司能快速判断它靠什么成立、强在哪、弱在哪。
- **金融与投资** —— 从「一家公司怎么赚钱」这样的微观问题入手，逐步往上接行业格局与宏观。
- **知识系统** —— 把「学习」本身做成一套可复利的方法，越积累越快 —— 这个网站背后就是它。

这几条最终指向同一件事：**看懂复杂系统怎么运转，再把判断真正用出来。**

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
  marked.setOptions({ breaks: true, gfm: true });
  const AVATAR = "avatar.jpg"; // 把照片以这个文件名放进同目录即可

  const blocks = [...document.querySelectorAll('script[type="text/markdown"]')].map(s => ({
    key: s.dataset.key, label: s.dataset.label, group: s.dataset.group,
    eyebrow: s.dataset.eyebrow, md: s.textContent.trim()
  }));

  const doc = document.getElementById("doc");
  const menu = document.getElementById("menu");
  const search = document.getElementById("search");

  // render all sections stacked (one continuous page)
  blocks.forEach(b => {
    const sec = document.createElement("section");
    sec.className = "block"; sec.id = b.key;
    const eb = b.eyebrow ? `<div class="eyebrow">${b.eyebrow}</div>` : "";
    sec.innerHTML = eb + marked.parse(b.md);
    doc.appendChild(sec);
  });

  // external links new tab
  doc.querySelectorAll('a[href^="http"]').forEach(a => { a.target = "_blank"; a.rel = "noopener"; });
  // project repo links
  doc.querySelectorAll("p").forEach(p => {
    if (p.textContent.trim().startsWith("→") && p.querySelector("a")) p.classList.add("repo-link");
  });

  // build hero (avatar + name + one-liner + subline) inside #about
  (function buildHero() {
    const about = document.getElementById("about");
    const h1 = about.querySelector("h1");
    const bq = about.querySelector("blockquote");
    let sub = bq ? bq.nextElementSibling : null;
    if (!h1) return;
    const hero = document.createElement("div"); hero.className = "hero";
    const text = document.createElement("div"); text.className = "hero-text";
    const av = document.createElement("div"); av.className = "hero-avatar";
    const img = new Image();
    img.alt = "马浩然 Frank"; img.src = AVATAR;
    img.onerror = () => {
      const fb = document.createElement("div"); fb.className = "avatar-fallback";
      fb.textContent = "把照片存为 avatar.jpg 放进本目录即可显示";
      av.replaceChildren(fb);
    };
    av.appendChild(img);
    about.insertBefore(hero, h1);
    text.appendChild(h1);
    if (bq) text.appendChild(bq);
    if (sub && sub.tagName === "P") { sub.classList.add("hero-sub"); text.appendChild(sub); }
    hero.append(text, av);
  })();

  // sidebar: single-item group => standalone clickable; multi-item => header + children
  const groups = [];
  blocks.forEach(b => {
    let g = groups.find(x => x.name === b.group);
    if (!g) { g = { name: b.group, items: [] }; groups.push(g); }
    g.items.push(b);
  });
  groups.forEach(g => {
    const wrap = document.createElement("div"); wrap.className = "nav-group";
    if (g.items.length === 1) {
      const it = g.items[0];
      const btn = document.createElement("button");
      btn.className = "nav-item standalone"; btn.textContent = g.name; btn.dataset.key = it.key;
      btn.onclick = () => goto(it.key); wrap.appendChild(btn);
    } else {
      wrap.innerHTML = `<h4>${g.name}</h4>`;
      g.items.forEach(it => {
        const btn = document.createElement("button");
        btn.className = "nav-item"; btn.textContent = it.label; btn.dataset.key = it.key;
        btn.onclick = () => goto(it.key); wrap.appendChild(btn);
      });
    }
    menu.appendChild(wrap);
  });

  function goto(key) {
    const el = document.getElementById(key); if (!el) return;
    history.replaceState(null, "", "#" + key);
    el.scrollIntoView({ behavior: "smooth", block: "start" });
  }
  document.querySelectorAll("[data-go]").forEach(el =>
    el.addEventListener("click", e => { e.preventDefault(); goto(el.dataset.go); }));

  // scrollspy
  const sections = blocks.map(b => document.getElementById(b.key));
  function spy() {
    let cur = blocks[0].key;
    sections.forEach(s => { if (s.getBoundingClientRect().top <= 140) cur = s.id; });
    document.querySelectorAll(".nav-item").forEach(el => el.classList.toggle("active", el.dataset.key === cur));
  }
  window.addEventListener("scroll", spy, { passive: true }); spy();

  // search filters nav
  search.addEventListener("input", () => {
    const q = search.value.trim().toLowerCase();
    document.querySelectorAll(".nav-item").forEach(el => {
      const b = blocks.find(x => x.key === el.dataset.key);
      el.classList.toggle("hidden", q && !(el.textContent.toLowerCase().includes(q) || b.md.toLowerCase().includes(q)));
    });
  });
  document.addEventListener("keydown", e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); search.focus(); }
  });

  const k = location.hash.replace("#", "");
  if (k && document.getElementById(k)) setTimeout(() => goto(k), 60);
</script>
</body>
</html>
